services:
  envoy:
    image: envoyproxy/envoy:v1.29.1
    ports:
      - "8080:8080"
      - "8001:8001"
    volumes:
      - ./envoy/envoy-real.yaml:/etc/envoy/envoy.yaml
    depends_on:
      sidecar:
        condition: service_healthy
    networks:
      - llm-gateway-net
    restart: always

  sidecar:
    build:
      context: .
      dockerfile: docker/sidecar.Dockerfile
    ports:
      - "50051:50051"
    environment:
      - GATEWAY_API_KEYS=${GATEWAY_API_KEYS:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - llm-gateway-net
    restart: always
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50051"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  llm-gateway-net:
    driver: bridge
