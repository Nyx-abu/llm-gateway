
services:
  envoy:
    image: envoyproxy/envoy:v1.29.1
    ports:
      - "8080:8080"
      - "8001:8001"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml
    depends_on:
      - sidecar
      - mock-server
    networks:
      - llm-gateway-net
    restart: always

  sidecar:
    build:
      context: .
      dockerfile: docker/sidecar.Dockerfile
    ports:
      - "50051:50051"
    networks:
      - llm-gateway-net
    restart: always

  mock-server:
    build:
      context: .
      dockerfile: docker/mock-server.Dockerfile
    ports:
      - "8081:8081"
    environment:
      - MOCK_SERVER_PORT=8081
    networks:
      - llm-gateway-net
    restart: always

networks:
  llm-gateway-net:
    driver: bridge
