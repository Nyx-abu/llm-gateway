
services:
  envoy:
    image: envoyproxy/envoy:v1.29.1
    ports:
      - "8080:8080"
      - "8001:8001"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml
    command: ["-c", "/etc/envoy/envoy.yaml", "-l", "debug"]
    depends_on:
      sidecar:
        condition: service_healthy
      mock-server:
        condition: service_healthy
    networks:
      - llm-gateway-net
    restart: always

  sidecar:
    build:
      context: .
      dockerfile: docker/sidecar.Dockerfile

    environment:
      - GATEWAY_API_KEYS=${GATEWAY_API_KEYS:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - REDIS_ADDR=redis:6379
    networks:
      - llm-gateway-net
    restart: always
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50051"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  mock-server:
    build:
      context: .
      dockerfile: docker/mock-server.Dockerfile

    environment:
      - MOCK_SERVER_PORT=8081
    networks:
      - llm-gateway-net
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    networks:
      - llm-gateway-net
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  llm-gateway-net:
    driver: bridge
