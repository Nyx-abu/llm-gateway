admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 8001

static_resources:
  listeners:
  - name: listener_0
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8080
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          common_http_protocol_options:
            max_headers_count: 200
          route_config:
            name: local_route
            virtual_hosts:
            - name: local_service
              domains: ["*"]
              routes:
              - match:
                  prefix: "/dashboard"
                route:
                  cluster: sidecar-http
                typed_per_filter_config:
                  envoy.filters.http.ext_proc:
                    "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExtProcPerRoute
                    disabled: true
              - match:
                  prefix: "/api"
                route:
                  cluster: sidecar-http
                typed_per_filter_config:
                  envoy.filters.http.ext_proc:
                    "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExtProcPerRoute
                    disabled: true
              - match:
                  path: "/v1/chat/completions"
                  headers:
                  - name: "x-llm-provider"
                    exact_match: "openai"
                route:
                  cluster: openai
                  auto_host_rewrite: true
                  internal_redirect_policy:
                    max_internal_redirects: 1
                    redirect_response_codes: [307]
                    predicates:
                    - name: envoy.internal_redirect_predicates.previous_routes
                      typed_config:
                        "@type": type.googleapis.com/envoy.extensions.internal_redirect.previous_routes.v3.PreviousRoutesConfig
              - match:
                  path: "/v1/chat/completions"
                  headers:
                  - name: "x-llm-provider"
                    exact_match: "anthropic"
                route:
                  cluster: anthropic
                  auto_host_rewrite: true
                  internal_redirect_policy:
                    max_internal_redirects: 1
                    redirect_response_codes: [307]
                    predicates:
                    - name: envoy.internal_redirect_predicates.previous_routes
                      typed_config:
                        "@type": type.googleapis.com/envoy.extensions.internal_redirect.previous_routes.v3.PreviousRoutesConfig
              - match:
                  path: "/v1/messages"
                  headers:
                  - name: "x-llm-provider"
                    exact_match: "anthropic"
                route:
                  cluster: anthropic
                  auto_host_rewrite: true
                  internal_redirect_policy:
                    max_internal_redirects: 1
                    redirect_response_codes: [307]
                    predicates:
                    - name: envoy.internal_redirect_predicates.previous_routes
                      typed_config:
                        "@type": type.googleapis.com/envoy.extensions.internal_redirect.previous_routes.v3.PreviousRoutesConfig
              - match:
                  path: "/v1/messages"
                  headers:
                  - name: "x-llm-provider"
                    exact_match: "openai"
                route:
                  cluster: openai
                  auto_host_rewrite: true
                  internal_redirect_policy:
                    max_internal_redirects: 1
                    redirect_response_codes: [307]
                    predicates:
                    - name: envoy.internal_redirect_predicates.previous_routes
                      typed_config:
                        "@type": type.googleapis.com/envoy.extensions.internal_redirect.previous_routes.v3.PreviousRoutesConfig
              # Health check route (passthrough to Envoy admin ready endpoint)
              - match:
                  path: "/health"
                route:
                  cluster: openai
                  prefix_rewrite: "/health"
              # Fallback/default routes (used before ext_proc mutations occur or if header is missing)
              - match:
                  path: "/v1/chat/completions"
                route:
                  cluster: openai
                  auto_host_rewrite: true
                  internal_redirect_policy:
                    max_internal_redirects: 1
                    redirect_response_codes: [307]
                    predicates:
                    - name: envoy.internal_redirect_predicates.previous_routes
                      typed_config:
                        "@type": type.googleapis.com/envoy.extensions.internal_redirect.previous_routes.v3.PreviousRoutesConfig
              - match:
                  path: "/v1/messages"
                route:
                  cluster: anthropic
                  auto_host_rewrite: true
                  internal_redirect_policy:
                    max_internal_redirects: 1
                    redirect_response_codes: [307]
                    predicates:
                    - name: envoy.internal_redirect_predicates.previous_routes
                      typed_config:
                        "@type": type.googleapis.com/envoy.extensions.internal_redirect.previous_routes.v3.PreviousRoutesConfig
          http_filters:
          # Rate limiting: 100 requests per minute per client
          - name: envoy.filters.http.local_ratelimit
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
              stat_prefix: http_local_rate_limiter
              token_bucket:
                max_tokens: 10000
                tokens_per_fill: 10000
                fill_interval: 60s
              filter_enabled:
                runtime_key: local_rate_limit_enabled
                default_value:
                  numerator: 100
                  denominator: HUNDRED
              filter_enforced:
                runtime_key: local_rate_limit_enforced
                default_value:
                  numerator: 100
                  denominator: HUNDRED
              response_headers_to_add:
              - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                header:
                  key: x-ratelimit-limit
                  value: "100"
              - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                header:
                  key: retry-after
                  value: "60"
              status:
                code: TooManyRequests
          - name: envoy.filters.http.ext_proc
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
              failure_mode_allow: false
              async_mode: false
              processing_mode:
                request_header_mode: SEND
                response_header_mode: SEND
                request_body_mode: BUFFERED
                response_body_mode: BUFFERED
              grpc_service:
                envoy_grpc:
                  cluster_name: sidecar
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  - name: sidecar
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: sidecar
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: sidecar
                port_value: 50051

  - name: openai
    type: LOGICAL_DNS
    dns_lookup_family: V4_ONLY
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: openai
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: aiapiv2.pekpik.com
                port_value: 443
    transport_socket:
      name: envoy.transport_sockets.tls
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
        sni: aiapiv2.pekpik.com

  - name: anthropic
    type: LOGICAL_DNS
    dns_lookup_family: V4_ONLY
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: anthropic
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: api.anthropic.com
                port_value: 443
    transport_socket:
      name: envoy.transport_sockets.tls
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
        sni: api.anthropic.com

  - name: sidecar-http
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: sidecar-http
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: sidecar
                port_value: 8082
